name: release-cli

# Publishes the openroom JS CLI to npm on a tag matching `cli-v*`
# (e.g. `cli-v0.0.2`). Builds the esbuild bundle, packs it, and runs
# `npm publish --provenance` with trusted publishing — the GitHub OIDC
# id-token is exchanged directly for a short-lived npm credential, so
# NO NPM_TOKEN is required. Same model as PyPI trusted publishing.
#
# One-time npm setup (manual, via npmjs.com):
#   1. Sign in at https://www.npmjs.com
#   2. Visit https://www.npmjs.com/package/openroom/access (after the
#      package exists) and go to the Trusted Publishers section, OR
#      for a new package use https://www.npmjs.com/settings/<user>/trusted-publishers
#   3. Add a GitHub Actions publisher:
#        Repository owner:     dhruvyad
#        Repository name:      openroom
#        Workflow filename:    release-cli.yml
#        Environment name:     npm
#   4. Save.
#
# Trusted publishing requires npm >= 11.5.1, so the workflow bumps the
# npm CLI before publish (Node 22's bundled npm may lag).
#
# Release flow from the command line:
#   1. Bump version in packages/cli/package.json
#   2. Commit and push to main
#   3. git tag cli-v0.0.3 && git push --tags
#   4. This workflow runs, builds, publishes, and creates a GitHub Release.

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build bundle
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: install
        run: pnpm install --frozen-lockfile

      - name: read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "CLI version: $VERSION"

      - name: assert tag matches version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/cli-v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "tag $TAG does not match package.json version $VERSION" >&2
            exit 1
          fi

      - name: build bundle
        run: pnpm --filter openroom build

      - name: pack tarball
        run: |
          mkdir -p dist-out
          # Use `npm pack` (not `pnpm pack`) so the tarball layout is
          # exactly what the registry receives on publish. `pnpm pack`
          # also works but has some option differences we don't need.
          cd packages/cli
          npm pack --pack-destination=../../dist-out

      - uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: dist-out/
          if-no-files-found: error

  publish:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/openroom/v/${{ needs.build.outputs.version }}
    permissions:
      # Required for --provenance: signs the attestation with a short-
      # lived GitHub OIDC token so the published package can be
      # verified as coming from this workflow run.
      id-token: write
      # Required to create the GitHub Release at the end.
      contents: write
    steps:
      # gh release create shells out to git to discover the repo, so
      # we need a checkout even though we're installing from artifacts.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11.x out of the box, which has trusted
          # publishing built in. Node 22 LTS bundles an older npm and
          # `npm install -g npm@latest` breaks mid-upgrade on the
          # hosted toolcache ("Cannot find module 'promise-retry'"),
          # so we bypass that by picking a version with the right
          # bundled npm.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: print npm version
        run: npm --version

      - uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: dist-out/

      - name: publish to npm
        run: |
          TARBALL=$(ls "$PWD/dist-out/openroom-"*.tgz | head -1)
          if [ -z "$TARBALL" ]; then
            echo "no tarball found in dist-out/" >&2
            exit 1
          fi
          echo "publishing $TARBALL"
          # Absolute path is required here — npm 11 parses relative
          # paths containing a slash as git shorthand and tries to
          # clone `github:dist-out/openroom-...`.
          # No NODE_AUTH_TOKEN needed — npm uses the GitHub OIDC
          # id-token (granted by permissions.id-token: write below)
          # to authenticate against npmjs.com's trusted publisher
          # registration.
          npm publish "$TARBALL" --provenance --access public

      - name: create github release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
              --title "CLI ${{ needs.build.outputs.version }}" \
              --generate-notes \
              dist-out/*
